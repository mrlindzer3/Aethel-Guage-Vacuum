<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase II Spacetime Core - Mission Control</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020804;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffcc;
        }
        /* ─── NEW SCIENTIFIC TICKER BANNER ─── */
        #breakthrough-ticker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 28px;
            background: rgba(0, 26, 10, 0.9);
            border-bottom: 1px solid #ff00ff;
            z-index: 100;
            overflow: hidden;
            line-height: 28px;
            font-size: 11px;
            color: #ff00ff;
            font-weight: bold;
        }
        #ticker-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
        }
        @keyframes marquee {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
        #hud {
            position: absolute;
            top: 45px; /* Offset for ticker */
            left: 15px;
            width: 320px;
            background: rgba(2, 12, 6, 0.85);
            border: 1px solid #00ffcc;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            z-index: 10;
        }
        #metrics-panel {
            position: absolute;
            top: 45px; /* Offset for ticker */
            right: 15px;
            width: 300px;
            background: rgba(2, 12, 6, 0.85);
            border: 1px solid #00ffcc;
            padding: 15px;
            z-index: 10;
        }
        h2, h3 {
            margin-top: 0;
            border-bottom: 1px dashed #00ffcc;
            padding-bottom: 5px;
            color: #ffffff;
            text-transform: uppercase;
            font-size: 14px;
        }
        .control-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-size: 11px;
            margin-bottom: 3px;
        }
        input[type="range"] {
            width: 100%;
            background: #002211;
            accent-color: #00ffcc;
        }
        .val-display {
            float: right;
            color: #ffffff;
        }
        button {
            width: 100%;
            background: #003311;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            transition: 0.2s ease;
        }
        button:hover {
            background: #00ffcc;
            color: #020804;
            box-shadow: 0 0 10px #00ffcc;
        }
        .metric-row {
            font-size: 11px;
            margin-bottom: 6px;
        }
        .metric-val {
            color: #ffffff;
            float: right;
        }
        #tenant-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
            margin-top: 5px;
        }
        #tenant-table th, #tenant-table td {
            border: 1px solid #004422;
            padding: 4px;
            text-align: left;
        }
        #tenant-table th {
            background: #002211;
            color: #00ffcc;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- REAL-TIME BREAKTHROUGH MARQUEE -->
    <div id="breakthrough-ticker">
        <div id="ticker-text">📡 EPISTEMOLOGY CORE ACTIVE: Awaiting infinite-density tensor inputs...</div>
    </div>

    <!-- LEFT HUDBAR: SUBSYSTEM MANIPULATION -->
    <div id="hud">
        <h2>Substrate Control</h2>
        <div class="metric-row">Link Status: <span id="conn-status" style="color: #ff3333;">DISCONNECTED</span></div>
        <div class="metric-row">Storage Sync: <span id="sync-status" style="color: #ffcc00;">IDLE</span></div>
        
        <hr style="border: 0; border-top: 1px solid #004422; margin: 12px 0;">

        <div class="control-group">
            <label>Immirzi Parameter (γ): <span id="gamma-val" class="val-display">0.272</span></label>
            <input type="range" id="gamma" min="0.05" max="1.0" step="0.001" value="0.272">
        </div>
        <div class="control-group">
            <label>Substrate Gravity (G): <span id="gravity-val" class="val-display">1.0</span></label>
            <input type="range" id="gravity" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>Shield Suppression: <span id="safety-val" class="val-display">2.0</span></label>
            <input type="range" id="safety_factor" min="0.5" max="5.0" step="0.1" value="2.0">
        </div>

        <button id="btn-bootstrap" style="border-color: #ff00ff; color: #ff00ff;">Activate Causal Bootstrap</button>
        <button id="btn-discovery" style="border-color: #ffffff; color: #ffffff;">Stream Discovery Tensor</button>

        <canvas id="telemetryChart" width="320" height="120" style="margin-top: 15px;"></canvas>
    </div>

    <!-- RIGHT HUDBAR: PRODUCTION MONITORING -->
    <div id="metrics-panel">
        <h2>System Telemetry</h2>
        <div class="metric-row">Network Mode: <span id="net-mode" class="metric-val">METCALFE_P2P</span></div>
        <div class="metric-row">Temporal Leakage: <span id="shield-leakage" class="metric-val">0.0000</span></div>

        <h3>Active Revenue Ledger</h3>
        <table id="tenant-table">
            <thead>
                <tr>
                    <th>Tenant ID</th>
                    <th>Tier</th>
                    <th>Yield (USD)</th>
                </tr>
            </thead>
            <tbody id="tenant-rows"></tbody>
        </table>
    </div>

    <script>
        // THREE.JS VIEWPORT RUNTIME
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        camera.position.z = 5;

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(640 * 3);
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0x00ffcc, size: 0.07, transparent: true });
        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // CHART.JS TELEMETRY
        const ctx = document.getElementById('telemetryChart').getContext('2d');
        const telemetryChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(30).fill(''),
                datasets: [{ data: Array(30).fill(0), borderColor: '#00ffcc', borderWidth: 1.5, pointRadius: 0 }]
            },
            options: { responsive: true, animation: false, plugins: { legend: { display: false } } }
        });

        // WEBSOCKET ROUTING PIPELINE
        const ws = new WebSocket("ws://127.0.0.1:8000/ws");

        ws.onopen = () => { document.getElementById("conn-status").innerText = "LIVE_STREAM"; document.getElementById("conn-status").style.color = "#00ff00"; };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.positions) {
                const posAttr = particleSystem.geometry.attributes.position;
                const flatPositions = data.positions.flat();
                for (let i = 0; i < flatPositions.length; i++) { posAttr.array[i] = flatPositions[i]; }
                posAttr.needsUpdate = true;
            }

            // RECEIVE QUANTUM BREAKTHROUGH PACKETS
            if (data.scientific_discovery_event) {
                // 1. Update the scrolling marquee text with zero-entropy solution
                const ticker = document.getElementById("ticker-text");
                ticker.innerText = `✨ [NEW DISCOVERY SECURED - ${data.domain}]: ${data.breakthrough_summary} (Fidelity: ${data.solution_fidelity.toFixed(9)})`;
                
                // 2. Append research transaction to commercial ledger
                const tbody = document.getElementById("tenant-rows");
                const metrics = data.billing_metrics;
                const newRow = `<tr>
                    <td>${metrics.tenant}</td>
                    <td style="color: #ff00ff;">RESEARCH</td>
                    <td style="color: #ffffff;">$${metrics.pass_revenue_usd.toFixed(2)}</td>
                </tr>`;
                tbody.insertAdjacentHTML('afterbegin', newRow);
            }
        };

        // STREAM SAMPLE PROBLEM DATA KEY
        document.getElementById("btn-discovery").addEventListener("click", () => {
            if (ws.readyState === WebSocket.OPEN) {
                const domains = ["BIOMEDICAL", "MATERIAL_SCIENCE", "QUANTUM_PHYSICS"];
                const randomDomain = domains[Math.floor(Math.random() * domains.length)];
                ws.send(JSON.stringify({
                    run_scientific_discovery: true,
                    scientific_domain: randomDomain,
                    problem_tensor: [2.5, -1.2, 0.9, 4.4]
                }));
            }
        });

        function animate() { requestAnimationFrame(animate); particleSystem.rotation.y += 0.0015; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
