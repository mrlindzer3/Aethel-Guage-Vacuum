<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AGV: Enterprise Mission Control</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030a0a; color: #00ffcc; font-family: monospace; transition: background-color 0.2s ease; }
        
        #hud { 
            position: absolute; top: 15px; left: 15px; z-index: 100; 
            background: rgba(5, 15, 15, 0.95); padding: 20px; 
            border: 1px solid #00ffcc; border-radius: 8px; width: 290px; 
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.15); 
        }
        
        #analytics {
            position: absolute; top: 15px; right: 15px; z-index: 100;
            background: rgba(5, 15, 15, 0.95); padding: 20px;
            border: 1px solid #00ffcc; border-radius: 8px; width: 350px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.15);
        }
        
        h1, h2, h3 { margin: 0 0 12px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #005544; padding-bottom: 5px; }
        h3 { font-size: 11px; margin-top: 15px; border-bottom: 1px dashed #003322; }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; margin-bottom: 5px; color: #a0ffd0; }
        input[type="range"] { width: 100%; background: #081d1d; outline: none; border-radius: 4px; height: 6px; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #00ffcc; cursor: pointer; border-radius: 50%; }
        .val-display { float: right; color: #ffffff; }
        canvas { background: #040d0d; border-radius: 4px; border: 1px solid #003322; }

        /* Buttons & Inputs */
        button {
            padding: 8px; background: #002211; 
            border: 1px solid #00ffcc; border-radius: 4px; 
            color: #00ffcc; font-family: monospace; font-size: 10px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s ease; width: 100%; margin-bottom: 10px;
        }
        button:hover { background: #00ffcc; color: #030a0a; box-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }
        
        select, input[type="text"] {
            width: 100%; background: #051515; border: 1px solid #005544;
            color: #ffffff; font-family: monospace; font-size: 11px;
            padding: 6px; border-radius: 4px; outline: none; box-sizing: border-box; margin-bottom: 10px;
        }
        select:focus, input[type="text"]:focus { border-color: #00ffcc; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="hud">
        <h1>AGV Core Controls</h1>
        
        <div class="control-group">
            <label>Immirzi Scale (Gamma): <span id="gamma-val" class="val-display">0.272</span></label>
            <input type="range" id="gamma" min="0.1" max="1.0" step="0.01" value="0.272">
        </div>
        <div class="control-group">
            <label>Refraction Multiplier: <span id="refract-val" class="val-display">1.0</span></label>
            <input type="range" id="refract" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>Substrate Gravity (G): <span id="gravity-val" class="val-display">1.0</span></label>
            <input type="range" id="gravity" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>
        
        <button id="btn-shockwave" style="margin-top: 5px;">Trigger Shockwave</button>

        <h3>Config Presets</h3>
        <div class="control-group">
            <label>Load Preset</label>
            <select id="preset-selector">
                <option value="" disabled selected>Select saved layout...</option>
            </select>
        </div>
        <div class="control-group">
            <label>Save Current State As:</label>
            <input type="text" id="preset-name-input" placeholder="e.g. My Gravity Field">
            <button id="btn-save-preset">Save Preset</button>
        </div>

        <div style="font-size: 10px; border-top: 1px dashed #005544; padding-top: 10px;">
            Connection: <span id="conn-status" style="color: #ff3333;">CONNECTING...</span>
        </div>
    </div>

    <div id="analytics">
        <h2>Live Telemetry Stream</h2>
        <canvas id="telemetryChart" width="350" height="200"></canvas>
    </div>

    <script>
        // --- 1. INITIALIZE THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 5;

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(640 * 3);
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({ color: 0x00ffcc, size: 0.08, transparent: true, opacity: 0.8 });
        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        const gridHelper = new THREE.GridHelper(10, 50, 0x003322, 0x001108);
        gridHelper.position.y = -2;
        scene.add(gridHelper);

        // --- 2. INITIALIZE CHART.JS ---
        const ctx = document.getElementById('telemetryChart').getContext('2d');
        const maxDataPoints = 30;
        const telemetryChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(maxDataPoints).fill(''),
                datasets: [{
                    label: 'RF Drive (MHz)',
                    data: Array(maxDataPoints).fill(0),
                    borderColor: '#00ffcc',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.3,
                    yAxisID: 'y'
                }]
            },
            options: {
                responsive: true,
                animation: false,
                scales: {
                    x: { display: false },
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        grid: { color: '#002211' },
                        ticks: { color: '#a0ffd0', font: { family: 'monospace', size: 9 } }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#00ffcc', font: { family: 'monospace', size: 10 } } }
                }
            }
        });

        // --- 3. ESTABLISH WEBSOCKET PIPELINE ---
        const ws = new WebSocket("ws://127.0.0.1:8000/ws");
        let activePresets = {};

        ws.onopen = () => {
            document.getElementById("conn-status").innerText = "CONNECTED (LIVE)";
            document.getElementById("conn-status").style.color = "#00ff00";
            loadPresetsFromServer();
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            const posAttr = particleSystem.geometry.attributes.position;
            const flatPositions = data.positions.flat();
            for (let i = 0; i < flatPositions.length; i++) {
                posAttr.array[i] = flatPositions[i];
            }
            posAttr.needsUpdate = true;

            const freqs = data.rf_frequencies_mhz;
            const avgRF = freqs.reduce((a, b) => a + b, 0) / freqs.length;

            if (data.current_laws.shockwave_active) {
                document.body.style.backgroundColor = "#0e021a";
                setTimeout(() => { document.body.style.backgroundColor = "#030a0a"; }, 150);
            }

            telemetryChart.data.datasets[0].data.push(avgRF);
            telemetryChart.data.datasets[0].data.shift();
            telemetryChart.update();
        };

        ws.onclose = () => {
            document.getElementById("conn-status").innerText = "DISCONNECTED";
            document.getElementById("conn-status").style.color = "#ff3333";
        };

        // --- 4. PRESET PERSISTENCE IMPLEMENTATION ---
        async function loadPresetsFromServer() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/presets');
                activePresets = await response.json();
                
                const selector = document.getElementById("preset-selector");
                selector.innerHTML = '<option value="" disabled selected>Select saved layout...</option>';
                
                Object.keys(activePresets).forEach(name => {
                    const opt = document.createElement("option");
                    opt.value = name;
                    opt.innerText = name;
                    selector.appendChild(opt);
                });
            } catch (err) {
                console.error("Error loading presets:", err);
            }
        }

        // Apply a selected preset to the UI and transmit back up to the server
        document.getElementById("preset-selector").addEventListener("change", (e) => {
            const name = e.target.value;
            const config = activePresets[name];
            if (config) {
                document.getElementById("gamma").value = config.gamma;
                document.getElementById("refract").value = config.refractive_multiplier;
                document.getElementById("gravity").value = config.gravity_G;
                transmitSliderConfig();
            }
        });

        // Save new preset
        document.getElementById("btn-save-preset").addEventListener("click", () => {
            const input = document.getElementById("preset-name-input");
            const name = input.value.trim();
            if (!name) return alert("Please enter a name for the preset.");
            
            const configValues = {
                gamma: parseFloat(document.getElementById("gamma").value),
                refractive_multiplier: parseFloat(document.getElementById("refract").value),
                gravity_G: parseFloat(document.getElementById("gravity").value)
            };

            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: "save_preset",
                    name: name,
                    values: configValues
                }));
                input.value = "";
                // Briefly reload dropdown
                setTimeout(loadPresetsFromServer, 200);
            }
        });

        // Continuous telemetry state transmission
        function transmitSliderConfig() {
            const gamma = document.getElementById("gamma").value;
            const refract = document.getElementById("refract").value;
            const gravity = document.getElementById("gravity").value;

            document.getElementById("gamma-val").innerText = gamma;
            document.getElementById("refract-val").innerText = refract;
            document.getElementById("gravity-val").innerText = gravity;

            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: "update_state",
                    gamma: parseFloat(gamma),
                    refractive_multiplier: parseFloat(refract),
                    gravity_G: parseFloat(gravity),
                    trigger_shockwave: false
                }));
            }
        }

        document.getElementById("btn-shockwave").addEventListener("click", () => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: "update_state",
                    gamma: parseFloat(document.getElementById("gamma").value),
                    refractive_multiplier: parseFloat(document.getElementById("refract").value),
                    gravity_G: parseFloat(document.getElementById("gravity").value),
                    trigger_shockwave: true
                }));
            }
        });

        document.getElementById("gamma").addEventListener("input", transmitSliderConfig);
        document.getElementById("refract").addEventListener("input", transmitSliderConfig);
        document.getElementById("gravity").addEventListener("input", transmitSliderConfig);

        function animate() {
            requestAnimationFrame(animate);
            particleSystem.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
