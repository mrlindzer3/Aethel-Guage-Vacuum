name: Python tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.10]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; else python -m pip install pytest numpy; fi

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest -q

  perf_check:
    name: Performance check (avg latency)
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; else python -m pip install pytest numpy; fi

      - name: Run performance check and emit JSON summary
        id: perf
        env:
          PYTHONPATH: .
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%SZ")
          OUT_DIR="archive/perf"
          OUT_FILE="$OUT_DIR/${TIMESTAMP}-${GITHUB_RUN_ID}.json"
          mkdir -p "$OUT_DIR"
          python tests/performance_check.py --cycles 10 --threshold 5.0 --emit-json "$OUT_FILE"
          echo "OUT_FILE=$OUT_FILE" >> $GITHUB_OUTPUT

      - name: Upload perf JSON as artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: perf-record-${{ github.run_id }}-${{ github.run_number }}
          path: ${{ steps.perf.outputs.OUT_FILE }}

      - name: Conditional: commit archive record to archive/records branch if ARCHIVE_PAT set
        if: ${{ secrets.ARCHIVE_PAT != '' }}
        env:
          ARCHIVE_PAT: ${{ secrets.ARCHIVE_PAT }}
          OUT_FILE: ${{ steps.perf.outputs.OUT_FILE }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin
          if git ls-remote --heads origin archive/records >/dev/null 2>&1; then
            git checkout --quiet archive/records
            git pull --rebase --quiet origin archive/records
          else
            git checkout --quiet -b archive/records
          fi

          # Add emitted JSON and ensure THEORIES.md exists
          git add "$OUT_FILE"
          if [ ! -f THEORIES.md ]; then
            echo "# Theories" > THEORIES.md
            echo "" >> THEORIES.md
            git add THEORIES.md
          fi

          # Extract metrics for THEORIES.md entry
          AVG_MS=$(python - <<PY
import json,sys
p='"${OUT_FILE}"'.strip('"')
try:
    j=json.load(open(p))
    print(j.get('avg_ms',''))
except Exception:
    print('')
PY
)
          MAX_MS=$(python - <<PY
import json,sys
p='"${OUT_FILE}"'.strip('"')
try:
    j=json.load(open(p))
    print(j.get('max_ms',''))
except Exception:
    print('')
PY
)

          THRESHOLD=5.0
          CONCLUSION="Supported"
          if [ -n "$AVG_MS" ]; then
            awk -v a="$AVG_MS" -v t="$THRESHOLD" 'BEGIN { if (a+0 > t+0) print "Not supported"; else print "Supported" }' >/tmp/concl || true
            if [ -s /tmp/concl ]; then
              CONCLUSION=$(cat /tmp/concl)
            fi
          fi

          TIMESTAMP_NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          echo "- id: ${TIMESTAMP}-${GITHUB_RUN_ID}" >> THEORIES.md
          echo "  title: Automated perf check ${TIMESTAMP}" >> THEORIES.md
          echo "  hypothesis: Stubbed pipeline runs under ${THRESHOLD} ms average" >> THEORIES.md
          echo "  experiment: tests/performance_check.py --cycles 10 --threshold ${THRESHOLD}" >> THEORIES.md
          echo "  artifacts: ${OUT_FILE}" >> THEORIES.md
          if [ -n "$AVG_MS" ]; then
            echo "  evidence: avg_ms=${AVG_MS} ms, max_ms=${MAX_MS} ms" >> THEORIES.md
          else
            echo "  evidence: see ${OUT_FILE}" >> THEORIES.md
          fi
          echo "  conclusion: ${CONCLUSION}" >> THEORIES.md
          echo "  author: @${GITHUB_ACTOR}" >> THEORIES.md
          echo "  date: ${TIMESTAMP_NOW}" >> THEORIES.md
          echo "" >> THEORIES.md

          if git diff --cached --quiet; then
            echo "No new archive records to commit"
          else
            git commit -m "chore(archive): add perf record ${GITHUB_RUN_ID} and update THEORIES.md" || true
            git push "https://x-access-token:${ARCHIVE_PAT}@github.com/${{ github.repository }}" HEAD:archive/records
          fi
