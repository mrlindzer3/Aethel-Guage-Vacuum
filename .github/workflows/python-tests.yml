name: Python tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.10]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; else python -m pip install pytest numpy; fi

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest -q

  perf_check:
    name: Performance check (avg latency)
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; else python -m pip install pytest numpy; fi

      - name: Run performance check and emit JSON summary
        env:
          PYTHONPATH: .
        run: |
          set -e
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%SZ")
          OUT_DIR="archive/perf"
          OUT_FILE="$OUT_DIR/${TIMESTAMP}-${GITHUB_RUN_ID}.json"
          mkdir -p "$OUT_DIR"
          python tests/performance_check.py --cycles 10 --threshold 5.0 --emit-json "$OUT_FILE"

      - name: Commit archive record to archive/records branch
        if: ${{ success() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Make sure we have the archive directory tracked
          git fetch origin
          git checkout -B archive/records
          git add archive/perf/*.json || true
          if git diff --cached --quiet; then
            echo "No new archive records to commit"
          else
            git commit -m "chore(archive): add perf record $GITHUB_RUN_ID"
            # Push using the GITHUB_TOKEN
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:archive/records
          fi
