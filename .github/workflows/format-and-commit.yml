name: format-and-commit

on:
  push:
    branches: [ feat/cgroup-throttle-manager ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feat/cgroup-throttle-manager

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install formatting tools
        run: |
          python -m pip install --upgrade pip
          pip install black==24.1.0 isort==5.12.0

      - name: Run black and isort
        run: |
          black .
          isort .

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "style: apply black/isort formatting"
            git push origin HEAD:feat/cgroup-throttle-manager
          else
            echo "No formatting changes"
          fi
