name: Quantum Validator CI

on:
  push:
    branches: [ feat/quantum-validator/scaffold ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sympy numpy pytest

      - name: Run tests
        run: |
          pytest qvalidate/symbolic/tests -q
